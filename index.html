<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>School Fundraiser Profit Calculator</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f5f7fb;
      margin:0;
      padding:40px 16px;
    }
    .container{
      max-width:600px;
      margin:0 auto;
      background:white;
      padding:32px;
      border-radius:12px;
      box-shadow:0 10px 30px rgba(0,0,0,.1);
      text-align:center;
    }
    h1{ margin-top:0; font-size:28px; }
    p{ color:#444; line-height:1.4; margin-bottom:18px; }
    .form{
      text-align:left;
      margin-top:18px;
    }
    label{
      display:block;
      margin-top:14px;
      font-weight:600;
      font-size:14px;
    }
    input{
      padding:10px;
      margin-top:6px;
      width:100%;
      border:1px solid #ccc;
      border-radius:8px;
      font-size:16px;
      box-sizing:border-box;
    }
    button{
      background:#2d7ef7;
      color:white;
      border:none;
      padding:12px 18px;
      font-size:16px;
      border-radius:10px;
      cursor:pointer;
      margin-top:18px;
      width:100%;
      font-weight:700;
    }
    button:hover{ background:#1c63cc; }
    #result{
      margin-top:18px;
      padding:14px;
      background:#f0f6ff;
      border:1px solid #d6e6ff;
      border-radius:10px;
      font-size:16px;
      font-weight:700;
    }
    .small-note{
      margin-top:12px;
      font-size:12px;
      color:#666;
      font-weight:400;
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>How Much Money Could Your School Fundraiser Raise?</h1>
    <p>Use this free calculator to estimate how much your school could raise based on student participation.</p>

    <div class="form">
      <label>Number of Students</label>
      <input id="students" type="number" value="400" min="0" />

      <label>Participation Rate (%)</label>
      <input id="participation" type="number" value="60" min="0" max="100" />

      <label>Average Donation per Participating Student ($)</label>
      <input id="donation" type="number" value="45" min="0" />
    </div>

    <button onclick="calculate()">Calculate</button>

    <div id="result">Enter your numbers and click Calculate.</div>
    <div class="small-note">
      Estimates vary by school. This tool is meant for quick planning.
    </div>

    <script>
      function calculate() {
        let students = parseFloat(document.getElementById("students").value || "0");
        let participation = parseFloat(document.getElementById("participation").value || "0") / 100;
        let donation = parseFloat(document.getElementById("donation").value || "0");

        participation = Math.max(0, Math.min(1, participation));

        let participants = students * participation;
        let total = participants * donation;

        const formatted = total.toLocaleString(undefined, { style: "currency", currency: "USD" });

        document.getElementById("result").innerText =
          `This fundraiser could raise approximately ${formatted}.`;
      }
    </script>

  </div>
</body>
</html>
